name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest          # 깃허브가 빌려주는 리눅스 러너
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4    # 러너에 레포 코드 가져옴

      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle              # 의존성 캐싱 → 다음 실행부터 빨라짐

      - name: gradlew 실행 권한
        run: chmod +x ./gradlew

      - name: 테스트 실행
        run: ./gradlew test          # 여기가 진짜 CI

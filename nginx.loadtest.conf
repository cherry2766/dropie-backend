upstream dropie_backend {
    # 기본 분배 방식 = 라운드로빈 (app1 → app2 → app3 번갈아)
    # max_fails=0 : 버스트 중 순간 실패로 멀쩡한 앱을 죽은 걸로 오판·축출하지 않음
    #              (기본값은 1회 실패 시 10초간 제외 → 남은 요청에 가짜 503을 뱉음)
    server app1:8080 max_fails=0;
    server app2:8080 max_fails=0;
    server app3:8080 max_fails=0;

    # nginx ↔ 앱 커넥션을 매 요청마다 새로 안 만들고 재사용 (커넥션 생성 폭주 완화)
    keepalive 256;
}

server {
    # backlog=4096 : 동시에 도착한 새 커넥션을 줄 세우는 대기열 크기
    #               기본 511이라 1000 버스트 시 초과분이 OS 레벨에서 거부됨 → 4096으로 확대
    #               (실제로는 net.core.somaxconn 상한으로 깎임)
    listen 80 backlog=4096;

    location / {
        proxy_pass http://dropie_backend;
        proxy_http_version 1.1;          # keepalive 재사용을 위해 HTTP/1.1 사용
        proxy_set_header Connection "";   # 업스트림 커넥션을 닫지 않고 유지
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
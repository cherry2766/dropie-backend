# ===========================================
# 운영용 (EC2에서 사용)
# - DB: RDS (외부) → DB_HOST를 .env에서 RDS 엔드포인트로 주입
# - Redis: 같은 EC2 안에 Docker 컨테이너 (ElastiCache 대비 비용 절감)
# - app: Dockerfile로 빌드한 Spring Boot
# - 환경변수는 같은 디렉터리의 .env 파일에서 자동 로드
# 실행: docker compose up -d --build
# ===========================================

services:
  redis:
    image: redis:latest
    container_name: dropie-redis
    restart: always   # EC2 재부팅/컨테이너 비정상 종료 시 자동 재시작
    # 운영에선 외부 포트 노출 X (보안)
    # app 컨테이너가 compose 네트워크 안에서 'redis' 서비스명으로 접근
    # --maxmemory 256mb : t3.micro RAM(1GB) 보호 — Redis가 메모리 독식 방지
    # --maxmemory-policy allkeys-lru : 메모리 한도 도달 시 LRU로 오래된 키 제거
    command: >
      redis-server
      --notify-keyspace-events Ex
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 로그 파일 10MB 넘으면 새 파일로 (디스크 보호)
        max-file: "3"     # 최대 3개까지만 보관

  app:
    build: .   # 현재 디렉터리의 Dockerfile로 이미지 빌드
    container_name: dropie-app
    restart: always
    depends_on:
      - redis   # redis 먼저 뜬 뒤 app 시작 (단, redis '준비완료'까진 보장 안 함)
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # DB (RDS) — .env의 DB_HOST에 RDS 엔드포인트 입력
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis — 같은 compose 네트워크의 'redis' 서비스명으로 접근
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      JWT_SECRET: ${JWT_SECRET}

      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME}

      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY}

      CLAUDE_API_KEY: ${CLAUDE_API_KEY}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
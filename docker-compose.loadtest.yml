# 부하측정용 — Dropie 앱 3개 + nginx + 공유 redis/mysql
# 실행:  docker compose -f docker-compose.loadtest.yml up -d --build
# 종료:  docker compose -f docker-compose.loadtest.yml down

services:
  redis:
    image: redis:latest
    command: redis-server --notify-keyspace-events Ex --appendonly yes

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dropie
    healthcheck:                 # 앱이 "DB 준비됨" 확인 후 뜨도록 (안 그러면 부팅 실패)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    build: .
    environment: &app-env        # 공통 환경변수 (YAML 앵커 → 3개 앱이 재사용)
      SPRING_PROFILES_ACTIVE: loadtest
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dropie
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_LOCK_TYPE: ${APP_LOCK_TYPE:-redis}      # ← 호스트에서 락 전환
      HIKARI_POOL_SIZE: ${HIKARI_POOL_SIZE:-50}   # ← DB풀 튜닝
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  app2:
    build: .
    environment: *app-env        # app1의 환경변수 그대로 재사용
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  app3:
    build: .
    environment: *app-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"                # k6는 http://localhost:8080 → nginx가 분배
    volumes:
      - ./nginx.loadtest.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
      - app3

  # ── 측정 결과 시각화 (k6 → InfluxDB → Grafana) ──────────────
  influxdb:
    image: influxdb:1.8           # 대시보드 2587은 InfluxDB v1 기준 → 1.8 사용
    environment:
      INFLUXDB_DB: k6             # k6가 --out influxdb 로 쏠 DB (자동 생성)
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "8086:8086"              # 호스트의 k6가 localhost:8086 으로 결과 전송

  grafana:
    image: grafana/grafana:10.4.2   # 대시보드 2587(옛 Angular 패널)이 온전히 렌더되는 버전. 11+는 Angular 제거로 시계열 패널 깨짐
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # 로그인 없이 바로 대시보드 보기 (캡처 편의)
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    ports:
      - "3000:3000"              # 브라우저에서 localhost:3000 → 대시보드 2587 자동 표시
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - influxdb
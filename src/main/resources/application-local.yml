# 로컬 개발용 설정 (IDE에서 그냥 실행하면 자동 적용)
# application.yml의 spring.profiles.active 기본값이 'local'이라 자동 로드됨

spring:
  jpa:
    hibernate:
      ddl-auto: update    # 로컬은 엔티티 변경하면 자동 반영 (편의)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.dropie: DEBUG
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
spring.application.name=dropie
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:tcp://localhost/~/dropie
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
# data.sql이 JPA 스키마 생성 이후에 실행되도록 설정
spring.jpa.defer-datasource-initialization=true
# H2 TCP 모드는 내장 DB로 인식되지 않아 기본값이 never → always로 강제
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
spring.jwt.secret=${JWT_SECRET}
spring.jwt.expiration=1800000

#log
logging.level.com.dropie=DEBUG
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<!--
    Dropie 메일 공용 레이아웃 (header / footer fragment)
    - 각 메일 템플릿에서 th:replace="~{email/layout :: header}" 로 삽입
    - 이메일 HTML은 메일 클라이언트 호환성 때문에 인라인 스타일 + table 기반으로 작성
-->
<body>

<!-- 상단 워드마크 영역 -->
<div th:fragment="header"
     style="padding: 32px 40px 0 40px;">
    <!--
        Dropie 워드마크
        - SVG 그라디언트는 메일 클라이언트 호환성이 떨어져 단색(#ff8fa3)으로 대체
        - Georgia italic 폰트 + 하트(♥)로 원본 로고 느낌만 재현
    -->
    <span style="font-family: Georgia, 'Times New Roman', serif;
                 font-style: italic;
                 font-weight: 900;
                 font-size: 32px;
                 color: #ff8fa3;
                 letter-spacing: -1px;">
        <span style="font-size: 22px; vertical-align: 2px; margin-right: 2px;">&#9829;</span>Dropie
    </span>
</div>

<!-- 하단 푸터 영역 -->
<div th:fragment="footer"
     style="padding: 0 40px 32px 40px;">
    <hr style="border: none; border-top: 1px solid #EAEAEA; margin: 32px 0 20px 0;">
    <p style="margin: 0; color: #999999; font-size: 12px; line-height: 1.6;">
        &#8251; 본 메일은 발신 전용이므로 회신 내용을 확인할 수 없습니다.
    </p>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 안내</title>
</head>
<!--
    비밀번호 재설정 메일
    - 변수: resetUrl (프론트 재설정 페이지 URL - 토큰 파라미터 포함)
-->
<body style="margin: 0; padding: 0; background-color: #F5F5F7;
             font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;">

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
       style="background-color: #F5F5F7; padding: 40px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0"
                   style="max-width: 600px; width: 100%; background-color: #FFFFFF; border-radius: 12px;">
                <tr>
                    <td>
                        <!-- 공용 헤더 -->
                        <div th:replace="~{email/layout :: header}"></div>

                        <div style="padding: 24px 40px 0 40px;">
                            <!-- 타이틀 -->
                            <h1 style="margin: 0 0 24px 0; color: #111111;
                                       font-size: 28px; font-weight: 700; line-height: 1.3;">
                                비밀번호 재설정 안내
                            </h1>

                            <!-- 본문 안내 -->
                            <p style="margin: 0 0 28px 0; color: #555555;
                                      font-size: 15px; line-height: 1.7;">
                                아래의 '비밀번호 재설정하기' 버튼을 눌러<br>
                                새 비밀번호를 설정해주세요.<br>
                                링크는 <strong style="color: #333333;">30분간</strong> 유효합니다.
                            </p>

                            <!-- CTA 버튼 -->
                            <p style="margin: 0 0 32px 0;">
                                <a th:href="${resetUrl}"
                                   style="display: inline-block;
                                          background-color: #ff8fa3;
                                          color: #FFFFFF !important;
                                          text-decoration: none;
                                          padding: 14px 32px;
                                          border-radius: 8px;
                                          font-size: 15px;
                                          font-weight: 600;">
                                    비밀번호 재설정하기
                                </a>
                            </p>

                            <!-- 보조 안내 -->
                            <p style="margin: 0; color: #777777;
                                      font-size: 14px; line-height: 1.7;">
                                본인이 요청하지 않았다면 이 메일을 무시해주세요.<br>
                                계정은 안전하게 보호되고 있습니다.
                            </p>
                        </div>

                        <!-- 공용 푸터 -->
                        <div th:replace="~{email/layout :: footer}"></div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
